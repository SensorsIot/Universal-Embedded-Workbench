# rtl_433 flex-decoder database for devices reverse-engineered on the
# Universal Embedded Workbench. Installed to /etc/rtl_433/rtl_433.conf, which
# rtl_433 auto-loads, so these devices are recognised by name in every decode.
#
# Add new devices with the "AI Sherlock" record→analyse flow, then append a
# `decoder` line here (one per distinct code; use match={<bits>}<hex>).
# Verify offline with: rtl_433 -y '{<bits>}<hex>'

# Euromot Awning remote — 433.92 MHz, OOK-PWM, 18-bit, device id 0x7F4.
# short 340us = '1', long 2068us = '0', reset 13.9ms, ~11 repeats/press.
# Buttons differ only in the low command bits.
decoder n=Euromot-Awning-up,m=OOK_PWM,s=340,l=2068,r=13936,g=2000,t=691,match={18}7f454
decoder n=Euromot-Awning-down,m=OOK_PWM,s=340,l=2068,r=13936,g=2000,t=691,match={18}7f45c
decoder n=Euromot-Awning-auto,m=OOK_PWM,s=340,l=2068,r=13936,g=2000,t=691,match={18}7f480
decoder n=Euromot-Awning-manual,m=OOK_PWM,s=340,l=2068,r=13936,g=2000,t=691,match={18}7f484
